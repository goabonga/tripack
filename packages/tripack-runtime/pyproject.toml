[project]
name = "tripack-runtime"
version = "0.2.0"
description = "Idempotent execution core of the Tripack IoC framework: resolution, dependency graph, per-scope caching, lifecycle and validation."
readme = "README.md"
requires-python = ">=3.13"
license = "MIT"
license-files = ["LICENSE"]
authors = [{ name = "Chris", email = "goabonga@pm.me" }]
keywords = ["dependency-injection", "ioc", "runtime", "resolution"]
classifiers = [
    "Development Status :: 1 - Planning",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Application Frameworks",
    "Typing :: Typed",
]
dependencies = [
    "tripack-contracts",
]

[project.urls]
Homepage = "https://github.com/goabonga/tripack"
Source = "https://github.com/goabonga/tripack/tree/main/packages/tripack-runtime"
Issues = "https://github.com/goabonga/tripack/issues"
Changelog = "https://github.com/goabonga/tripack/blob/main/packages/tripack-runtime/CHANGELOG.md"

[build-system]
requires = ["hatchling>=1.27"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tripack_runtime"]

[tool.hatch.build.targets.sdist]
include = [
    "src/tripack_runtime",
    "tests",
    "README.md",
    "CHANGELOG.md",
]
