[project]
name = "tripack-contracts"
version = "0.0.0"
description = "Public contracts of the Tripack IoC framework: protocols, interfaces, types, exceptions and annotations."
readme = "README.md"
requires-python = ">=3.13"
license = "MIT"
license-files = ["LICENSE"]
authors = [{ name = "Chris", email = "goabonga@pm.me" }]
keywords = ["dependency-injection", "ioc", "contracts", "protocols"]
classifiers = [
    "Development Status :: 1 - Planning",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Application Frameworks",
    "Typing :: Typed",
]
dependencies = []

[project.urls]
Homepage = "https://github.com/goabonga/tripack"
Source = "https://github.com/goabonga/tripack/tree/main/packages/tripack-contracts"
Issues = "https://github.com/goabonga/tripack/issues"
Changelog = "https://github.com/goabonga/tripack/blob/main/packages/tripack-contracts/CHANGELOG.md"

[build-system]
requires = ["hatchling>=1.27"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tripack_contracts"]

[tool.hatch.build.targets.sdist]
include = [
    "src/tripack_contracts",
    "tests",
    "README.md",
    "CHANGELOG.md",
]
